name: hello
description: "IndieLife - Student Services Platform"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.0.0
  google_fonts: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.1.1+1
  geolocator: ^12.0.0
  badges: ^3.0.0
  flutter_secure_storage: ^9.1.0
  intl: ^0.20.2
  socket_io_client: ^2.0.3+1
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  flutter_stripe: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: AovelSansRounded
      fonts:
        - asset: assets/fonts/AovelSansRounded.ttf

    - family: Believe_It
      fonts:
        - asset: assets/fonts/Believe_It.ttf

    - family: ArianaVioleta
      fonts:
        - asset: assets/fonts/ArianaVioleta.ttf

    - family: ShadeBlue
      fonts:
        - asset: assets/fonts/ShadeBlue.ttf

    - family: CookieChip
      fonts:
        - asset: assets/fonts/CookieChip.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Logo.png
